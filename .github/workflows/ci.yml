name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: unified_inbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/unified_inbox?schema=public
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-session-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter api exec prisma generate

      - name: Prisma migrate
        run: pnpm --filter api exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Seed database
        run: pnpm --filter api exec prisma db seed

      - name: Smoke test
        run: |
          cd apps/api && node dist/main.js &
          API_PID=$!
          # wait for API to be ready
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3001/health >/dev/null 2>&1; then break; fi
            sleep 1
          done
          bash scripts/smoke-local.sh
          kill $API_PID || true
